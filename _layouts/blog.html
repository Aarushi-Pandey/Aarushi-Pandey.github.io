<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body class="{% if site.darkmode == true and site.darkmode != 'never' %}dark{% endif %}">
    {% include header.html %}

    <main class="page-content" aria-label="Content">
        <div class="wrapper">
    
          {%- if site.version == 2 -%}
            <div class="container {{ section.layout }}-container">
                <h3 id="{{ section.title | slugify }}">Blog</h3>
                
                {% for post in site.posts %}
                    <h2>
                        <a href="{{ post.url }}">{{ post.title }}</a>
                    </h2>
                    <p class="section__content__text">
                        {{ post.excerpt }}
                    </p>
                    <br><br>
                {% endfor %}

            </div>
          {% else %}
            {%- include v1/default.html -%}
          {%- endif -%}
        </div>
      </main>
    
      {%- include footer.html -%}
      {% if site.darkmode == false %}
        <script src="{{ '/assets/js/index.js' | relative_url }}"></script>
      {% endif %}
  </body>
</html>
